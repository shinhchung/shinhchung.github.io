baseURL = "https://blog.hnghd.com/"
languageCode = "en-us"
title = "Derek's Blog"
theme = "hnghd"
enableRobotsTXT = true
paginate = 10

[params]
  author = "Derek"
  description = "Writing, notes, recipes, and daily reads."
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowFullTextinRSS = true
  ShowToc = true
  TocOpen = false
  dateFormat = "2006-01-02"

  [params.assets]
    favicon = "favicon.svg"
    favicon16x16 = "favicon.svg"
    favicon32x32 = "favicon.svg"
    apple_touch_icon = "favicon.svg"

  [params.homeInfoParams]
    Title = "👋 Hi, I'm Derek!"
    Content = """
Welcome to my personal digital corner! 🪴 I write about software engineering, hands-on tech, culinary arts, and daily thoughts. 

Here is a quick guide to what you can explore in each section:

*   **✍️ [Blog](/blog/)** — In-depth articles, personal reflections, tech deep-dives, and life experiences.
*   **📝 [Notes](/notes/)** — Short-form programming snippets, useful code guides, daily reads, and quick thoughts.
*   **🍳 [Recipes](/recipes/)** — My collection of favorite home-cooked culinary creations, step-by-step recipes, and kitchen diaries.
*   **📰 [News](/news/)** — Curated tech updates, trending industry news, and interesting articles I discover.
*   **🔍 [Search](/search/)** & **🗃️ [Archive](/archive/)** — Quickly search or browse all my past posts chronologically.

Feel free to click around, and feel free to connect with me via the social links below!
"""

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/shinhchung"

[[params.socialIcons]]
  name = "x"
  url = "https://x.com/shinhchung"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/shinhchung/"


[frontmatter]
  date = ["date", "pubDate", "publishDate", ":default"]
  lastmod = [":fileModTime", ":default"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[menu]
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 1
  [[menu.main]]
    name = "Notes"
    url = "/notes/"
    weight = 2
  [[menu.main]]
    name = "Recipes"
    url = "/recipes/"
    weight = 3
  [[menu.main]]
    name = "News"
    url = "/news/"
    weight = 4
  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 5
  [[menu.main]]
    name = "Archive"
    url = "/archive/"
    weight = 6

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML"]
  page = ["HTML"]

[permalinks]
  blog = "/blog/:slug/"
  notes = "/notes/:slug/"
  recipes = "/recipes/:slug/"
  news = "/news/:slug/"
