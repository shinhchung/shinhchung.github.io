<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="36" height="36">
  <!-- Pointy ears -->
  <path d="M13 20 L9 9 L19 16 Z" fill="#f5f0e8" stroke="#2d5a27" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M35 20 L39 9 L29 16 Z" fill="#f5f0e8" stroke="#2d5a27" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Body -->
  <circle cx="24" cy="29" r="16" fill="#f5f0e8" stroke="#2d5a27" stroke-width="2"/>

  <!-- Eyes -->
  <ellipse cx="18.5" cy="27" rx="4.5" ry="5" fill="#2d5a27"/>
  <ellipse cx="29.5" cy="27" rx="4.5" ry="5" fill="#2d5a27"/>
  <!-- Eye shine -->
  <circle cx="20" cy="25" r="1.6" fill="white"/>
  <circle cx="31" cy="25" r="1.6" fill="white"/>
  <circle cx="17.5" cy="27.5" r="0.7" fill="white"/>
  <circle cx="28.5" cy="27.5" r="0.7" fill="white"/>

  <!-- Blush -->
  <ellipse cx="13.5" cy="32" rx="3" ry="1.5" fill="#f4a0a0" opacity="0.55"/>
  <ellipse cx="34.5" cy="32" rx="3" ry="1.5" fill="#f4a0a0" opacity="0.55"/>

  <!-- Smile -->
  <path d="M20 34 Q24 37.5 28 34" stroke="#2d5a27" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Leaf (Ghibli) -->
  <path d="M24 13 Q31 3 38 7 Q33 17 24 13Z" fill="#7bc67e" stroke="#2d5a27" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M24 13 Q17 3 10 7 Q15 17 24 13Z" fill="#5aad5e" stroke="#2d5a27" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Leaf vein -->
  <line x1="24" y1="13" x2="32" y2="7" stroke="#2d5a27" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="13" x2="16" y2="7" stroke="#2d5a27" stroke-width="0.8" opacity="0.5"/>
  <!-- Stem -->
  <line x1="24" y1="13" x2="24" y2="18" stroke="#2d5a27" stroke-width="1.8" stroke-linecap="round"/>
</svg>
